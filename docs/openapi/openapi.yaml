openapi: 3.1.0
info:
  title: llm-tts-api
  version: 0.1.0
  summary: Local-first OpenAI-compatible TTS API with pluggable providers, voice CRUD, and a rich synthesis endpoint.
  description: |
    Single-process FastAPI service exposing **two** speech-synthesis paths
    backed by the same internal pipeline (`synthesize_core`):

    - `POST /v1/audio/speech` — OpenAI-compatible thin translator.
    - `POST /v1/tts/synthesize` — rich endpoint with streaming, trailers,
      and per-request overrides.

    A voice store sits under `/v1/tts/voices/*` for CRUD operations on
    cloned-voice metadata + reference-audio blobs (FS by default; optional
    Postgres / S3 backends).

    Placeholder OpenAI surface (`/v1/audio/transcriptions`,
    `/v1/audio/translations`, `/v1/audio/voice_consents/*`, `/v1/chat/...`,
    `/v1/realtime/...`) is URL-stable and returns `501`.

    All error responses use the OpenAI envelope:
    `{"error": {"message", "type", "param", "code", "request_id"}}` and
    carry the `X-Error-Code` header.
  license:
    name: MIT

servers:
  - url: http://127.0.0.1:8000
    description: Local default bind (loopback).

tags:
  - name: health
    description: Liveness & readiness probes.
  - name: models
    description: OpenAI-compatible model catalog.
  - name: audio
    description: Speech / transcription / translation / voice-consent endpoints.
  - name: synthesize
    description: Rich `/v1/tts/synthesize` endpoint (buffered + streamed).
  - name: voices
    description: Voice store CRUD under `/v1/tts/voices`.
  - name: chat
    description: OpenAI-compatible chat completions (not implemented in this version).
  - name: realtime
    description: OpenAI-compatible realtime session/call endpoints (not implemented).

paths:
  /health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Lock-free liveness probe (FR-HL-01).
      description: |
        Always returns 200 once the ASGI worker can answer. Body includes
        the boot-time provider/device pair plus current queue depth and
        loaded models. Missing optional slots (test bypass) are reported
        as best-effort defaults — the probe MUST NOT fail merely because
        the lifespan was skipped.
      responses:
        '200':
          description: Process is alive.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  /ready:
    get:
      tags: [health]
      operationId: getReady
      summary: Readiness gate (FR-HL-02).
      description: |
        Returns 200 once `app.state.ready` is True (after warmup +
        preload + initial seed pass complete). During warmup or
        shutdown drain returns 503 with `{ready, reason}`.
      responses:
        '200':
          description: Service is ready to accept synthesis requests.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [ready] }
        '503':
          description: Not ready — service is still warming up or is draining.
          content:
            application/json:
              schema:
                type: object
                required: [ready, reason]
                properties:
                  ready: { type: boolean, enum: [false] }
                  reason:
                    type: string
                    enum: [warming_up, draining]

  /v1/models:
    get:
      tags: [models]
      operationId: listModels
      summary: List models visible to this API instance (OpenAI-compatible).
      responses:
        '200':
          description: Model catalog.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelListResponse' }

  /v1/audio/speech:
    post:
      tags: [audio]
      operationId: createSpeech
      summary: OpenAI-compatible speech synthesis.
      description: |
        Thin translator over `synthesize_core`. The rich-endpoint-only
        response headers (`X-Provider`, `X-Model`, `X-Device`, `X-Dtype`,
        `X-Voice-Source`, `X-Voice-Id`, `X-Chunks`, `X-Total-Duration-Ms`)
        are stripped so the response shape stays OpenAI-identical
        (FR-OA-01..03; equivalence pinned by NFR-PT-03b paired UAT).
      parameters:
        - name: stream
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: |
            When `true`, the response is streamed. When `false` (default),
            the body is buffered and `Content-Length` is set.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SpeechRequest' }
      responses:
        '200':
          description: Audio bytes (default `audio/wav`).
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            audio/wav:
              schema: { type: string, format: binary }
            audio/mpeg:
              schema: { type: string, format: binary }
            audio/flac:
              schema: { type: string, format: binary }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '422': { $ref: '#/components/responses/InvalidRequest' }
        '429': { $ref: '#/components/responses/CapacityError' }
        '500': { $ref: '#/components/responses/InternalError' }
        '501': { $ref: '#/components/responses/NotImplemented' }
        '502': { $ref: '#/components/responses/ProviderError' }
        '503': { $ref: '#/components/responses/CapacityError' }
        '504': { $ref: '#/components/responses/CapacityError' }

  /v1/tts/synthesize:
    post:
      tags: [synthesize]
      operationId: synthesize
      summary: Rich synthesis endpoint — buffered or streamed.
      description: |
        The rich endpoint. Shares `synthesize_core` with `/v1/audio/speech`
        (BR-9). When `stream=true` the response is chunked and
        `X-Chunks` / `X-Total-Duration-Ms` are emitted as trailing
        headers if and only if the client advertises `TE: trailers`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SynthesizeRequest' }
      responses:
        '200':
          description: Audio bytes (`audio/wav`).
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            X-Provider:
              schema: { type: string }
              description: Provider used.
            X-Model:
              schema: { type: string }
              description: Model id used.
            X-Device:
              schema: { type: string, enum: [mps, cuda, cpu] }
            X-Dtype:
              schema: { type: string }
            X-Voice-Source:
              schema: { type: string, enum: [seed, crud] }
            X-Voice-Id:
              schema: { type: string }
            X-Chunks:
              schema: { type: string }
              description: Number of chunks synthesized (header on buffered, trailer when streaming and supported).
            X-Total-Duration-Ms:
              schema: { type: string }
              description: Total audio duration in ms (header on buffered, trailer when streaming and supported).
          content:
            audio/wav:
              schema: { type: string, format: binary }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '422': { $ref: '#/components/responses/InvalidRequest' }
        '429': { $ref: '#/components/responses/CapacityError' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/ProviderError' }
        '503': { $ref: '#/components/responses/CapacityError' }
        '504': { $ref: '#/components/responses/CapacityError' }

  /v1/tts/voices:
    get:
      tags: [voices]
      operationId: listVoices
      summary: List voice summaries (FR-VS-06).
      responses:
        '200':
          description: Voice catalog (`id`, `language`, `source`, `created_at`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceListResponse' }
    post:
      tags: [voices]
      operationId: createVoice
      summary: Create a voice record + blob (multipart upload, FR-VS-05).
      description: |
        Multipart upload with two parts:
        - `metadata` — JSON `VoiceCreate`. `consent_acknowledged=true` is mandatory.
        - `audio` — `UploadFile`. Size capped by `TTS_REFAUDIO_MAX_BYTES`
          (NFR-SE-01); content-type allow-list + magic-bytes check
          (NFR-SE-02). Required on POST.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [metadata, audio]
              properties:
                metadata:
                  type: string
                  description: JSON-encoded `VoiceCreate`.
                audio:
                  type: string
                  format: binary
      responses:
        '201':
          description: Voice record created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceResponse' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '409':
          description: A voice with the requested id already exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/tts/voices/{voice_id}:
    parameters:
      - $ref: '#/components/parameters/VoiceId'
    get:
      tags: [voices]
      operationId: getVoice
      summary: Fetch one voice metadata record (FR-VS-07).
      responses:
        '200':
          description: Voice record.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceResponse' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '404': { $ref: '#/components/responses/VoiceNotFound' }
    put:
      tags: [voices]
      operationId: updateVoice
      summary: Update a voice's metadata and optionally replace its blob (FR-VS-08).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [metadata]
              properties:
                metadata:
                  type: string
                  description: JSON-encoded `VoiceUpdate`.
                audio:
                  type: string
                  format: binary
                  description: Optional. When present, atomically replaces the existing blob.
      responses:
        '200':
          description: Voice record updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceResponse' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '404': { $ref: '#/components/responses/VoiceNotFound' }
    delete:
      tags: [voices]
      operationId: deleteVoice
      summary: Remove both metadata and blob for a voice (FR-VS-09).
      responses:
        '204':
          description: Voice removed.
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '404': { $ref: '#/components/responses/VoiceNotFound' }

  /v1/tts/voices/{voice_id}/audio:
    parameters:
      - $ref: '#/components/parameters/VoiceId'
    get:
      tags: [voices]
      operationId: getVoiceAudio
      summary: Download the voice's reference-audio blob (FR-VS-07b).
      responses:
        '200':
          description: Audio bytes for the voice.
          headers:
            X-Voice-Id:
              schema: { type: string }
            X-Voice-Source:
              schema: { type: string, enum: [seed, crud] }
            X-Content-Sha256:
              schema: { type: string }
              description: SHA-256 hex digest of the returned bytes.
          content:
            audio/wav:
              schema: { type: string, format: binary }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '404': { $ref: '#/components/responses/VoiceNotFound' }

  /v1/audio/transcriptions:
    post:
      tags: [audio]
      operationId: createTranscription
      summary: Speech-to-text transcription (NOT IMPLEMENTED).
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/audio/translations:
    post:
      tags: [audio]
      operationId: createTranslation
      summary: Speech translation (NOT IMPLEMENTED).
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/audio/voices:
    post:
      tags: [audio]
      operationId: createOpenAIVoice
      summary: OpenAI voice enrollment placeholder (NOT IMPLEMENTED).
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/audio/voice_consents:
    get:
      tags: [audio]
      operationId: listVoiceConsents
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }
    post:
      tags: [audio]
      operationId: createVoiceConsent
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/audio/voice_consents/{consent_id}:
    parameters:
      - $ref: '#/components/parameters/ConsentId'
    get:
      tags: [audio]
      operationId: getVoiceConsent
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }
    post:
      tags: [audio]
      operationId: updateVoiceConsent
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }
    delete:
      tags: [audio]
      operationId: deleteVoiceConsent
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/chat/completions:
    post:
      tags: [chat]
      operationId: createChatCompletion
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }
    get:
      tags: [chat]
      operationId: listChatCompletions
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/chat/completions/{completion_id}:
    parameters:
      - $ref: '#/components/parameters/CompletionId'
    get:
      tags: [chat]
      operationId: retrieveChatCompletion
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }
    post:
      tags: [chat]
      operationId: updateChatCompletion
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }
    delete:
      tags: [chat]
      operationId: deleteChatCompletion
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/chat/completions/{completion_id}/messages:
    parameters:
      - $ref: '#/components/parameters/CompletionId'
    get:
      tags: [chat]
      operationId: listChatCompletionMessages
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/realtime/client_secrets:
    post:
      tags: [realtime]
      operationId: createRealtimeClientSecret
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/realtime/calls/{call_id}/accept:
    parameters:
      - $ref: '#/components/parameters/CallId'
    post:
      tags: [realtime]
      operationId: acceptRealtimeCall
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/realtime/calls/{call_id}/hangup:
    parameters:
      - $ref: '#/components/parameters/CallId'
    post:
      tags: [realtime]
      operationId: hangupRealtimeCall
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/realtime/calls/{call_id}/refer:
    parameters:
      - $ref: '#/components/parameters/CallId'
    post:
      tags: [realtime]
      operationId: referRealtimeCall
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/realtime/calls/{call_id}/reject:
    parameters:
      - $ref: '#/components/parameters/CallId'
    post:
      tags: [realtime]
      operationId: rejectRealtimeCall
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/realtime/sessions:
    post:
      tags: [realtime]
      operationId: createRealtimeSession
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

  /v1/realtime/transcription_sessions:
    post:
      tags: [realtime]
      operationId: createRealtimeTranscriptionSession
      responses:
        '501': { $ref: '#/components/responses/NotImplemented' }

components:
  parameters:
    ConsentId:
      name: consent_id
      in: path
      required: true
      schema: { type: string }
    CompletionId:
      name: completion_id
      in: path
      required: true
      schema: { type: string }
    CallId:
      name: call_id
      in: path
      required: true
      schema: { type: string }
    VoiceId:
      name: voice_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9_-]{1,64}$'

  headers:
    XRequestID:
      schema: { type: string }
      description: Correlation id assigned by the request-id middleware.

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string }
        provider: { type: string }
        provider_source: { type: string, enum: [auto, env] }
        device: { type: string, enum: [mps, cuda, cpu] }
        dtype: { type: string }
        model_loaded:
          type: array
          items: { type: string }
        queue_depth: { type: integer, minimum: 0 }
        concurrent_active: { type: integer, minimum: 0 }

    SpeechRequest:
      type: object
      required: [model, input, voice]
      properties:
        model: { type: string }
        input: { type: string }
        voice: { type: string }
        provider:
          type: [string, "null"]
          enum: [mlx_audio, voxtral, vllm-omni, null]
        response_format:
          type: string
          default: wav
        instructions: { type: [string, "null"] }
        speed: { type: [number, "null"] }
        stream_format: { type: [string, "null"] }
        normalize_db: { type: [number, "null"] }

    SynthesizeRequest:
      type: object
      required: [input]
      additionalProperties: false
      properties:
        input: { type: string }
        voice:
          type: [string, "null"]
          pattern: '^[a-z0-9_-]{1,64}$'
        provider: { type: [string, "null"] }
        model: { type: [string, "null"] }
        response_format:
          type: string
          enum: [wav]
          default: wav
        stream: { type: boolean, default: false }
        normalize_db: { type: [number, "null"] }
        max_sentences_per_chunk:
          type: [integer, "null"]
          minimum: 1
        language: { type: [string, "null"] }
        number_lang: { type: [string, "null"] }
        temperature: { type: [number, "null"] }
        top_p: { type: [number, "null"] }

    VoiceCreate:
      type: object
      required: [id, transcript, language, consent_acknowledged]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: '^[a-z0-9_-]{1,64}$'
        transcript: { type: string, minLength: 1 }
        language: { type: string, minLength: 1 }
        consent_acknowledged: { type: boolean, enum: [true] }
        number_lang: { type: string, default: "" }
        target_db: { type: number, default: -20.0 }
        temperature: { type: number, default: 0.8 }
        top_p: { type: number, default: 0.95 }
        max_sentences_per_chunk: { type: integer, minimum: 1, default: 2 }

    VoiceUpdate:
      type: object
      required: [transcript, language, consent_acknowledged]
      additionalProperties: false
      properties:
        transcript: { type: string, minLength: 1 }
        language: { type: string, minLength: 1 }
        consent_acknowledged: { type: boolean, enum: [true] }
        number_lang: { type: string, default: "" }
        target_db: { type: number, default: -20.0 }
        temperature: { type: number, default: 0.8 }
        top_p: { type: number, default: 0.95 }
        max_sentences_per_chunk: { type: integer, minimum: 1, default: 2 }

    VoiceRecord:
      type: object
      required:
        - id
        - transcript
        - language
        - consent_acknowledged
        - number_lang
        - target_db
        - temperature
        - top_p
        - max_sentences_per_chunk
        - source
        - created_at
        - updated_at
      additionalProperties: false
      properties:
        id: { type: string }
        transcript: { type: string }
        language: { type: string }
        consent_acknowledged: { type: boolean }
        number_lang: { type: string }
        target_db: { type: number }
        temperature: { type: number }
        top_p: { type: number }
        max_sentences_per_chunk: { type: integer }
        source: { type: string, enum: [seed, crud] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    VoiceResponse:
      $ref: '#/components/schemas/VoiceRecord'

    VoiceSummary:
      type: object
      required: [id, language, source, created_at]
      additionalProperties: false
      properties:
        id: { type: string }
        language: { type: string }
        source: { type: string, enum: [seed, crud] }
        created_at: { type: string, format: date-time }

    VoiceListResponse:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/VoiceSummary' }

    ModelObject:
      type: object
      required: [id]
      properties:
        id: { type: string }
        object:
          type: string
          enum: [model]
          default: model
        created:
          type: integer
          default: 0
        owned_by:
          type: string
          default: llm-tts-api

    ModelListResponse:
      type: object
      required: [data]
      properties:
        object:
          type: string
          enum: [list]
          default: list
        data:
          type: array
          items: { $ref: '#/components/schemas/ModelObject' }

    ErrorDetail:
      type: object
      required: [message, type, code]
      properties:
        message: { type: string }
        type:
          type: string
          enum:
            - validation_error
            - voice_error
            - provider_error
            - capacity_error
            - internal_error
        param: { type: [string, "null"] }
        code: { type: string }
        request_id: { type: string }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { $ref: '#/components/schemas/ErrorDetail' }

  responses:
    InvalidRequest:
      description: |
        Validation error — e.g. `invalid_parameter`, `voice_required`,
        `voice_reference_missing`, `consent_required`, `ref_audio_invalid`,
        `input_too_long`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

    VoiceNotFound:
      description: |
        `voice_error.voice_not_found` (or `voice_error.voice_blob_missing`
        when metadata exists but the blob is gone).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

    NotImplemented:
      description: Endpoint is reserved (OpenAI-compatible URL) but not implemented.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

    InternalError:
      description: Unhandled exception fallback — `internal_error.unexpected_error`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

    ProviderError:
      description: Provider failure — `provider_error.model_load_failed`, `synthesis_failed`, `no_viable_provider`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

    CapacityError:
      description: |
        Backpressure — `capacity_error.queue_full` (429),
        `service_unavailable` (503), or `timeout` (504).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
